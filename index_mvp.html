<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>大厂风云 - 职场抓马生存战 MVP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #1a1a2e; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        #game-container { 
            border: 4px solid #4a5568; 
            border-radius: 8px; 
            position: relative;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffd700;
            font-size: 20px;
            background: rgba(0,0,0,0.9);
            padding: 40px 60px;
            border-radius: 10px;
            z-index: 1000;
            text-align: center;
        }
        #loading-text {
            font-size: 14px;
            color: #a0aec0;
            margin-top: 15px;
        }
        /* UI 覆盖层 */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        /* 顶部信息栏 */
        #top-bar {
            background: rgba(74, 85, 104, 0.95);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
        }
        .stat {
            margin: 0 10px;
            font-size: 14px;
        }
        .stat-label { color: #a0aec0; }
        .stat-value { font-weight: bold; color: #ffd700; }
        .danger { color: #f56565 !important; }
        
        /* 进度条 */
        #progress-container {
            flex: 1;
            margin: 0 20px;
            background: #2d3748;
            border-radius: 5px;
            height: 20px;
            overflow: hidden;
        }
        #progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #48bb78, #38a169);
            width: 0%;
            transition: width 0.3s;
        }
        
        /* 技能栏 */
        #skill-bar {
            position: absolute;
            bottom: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }
        .skill-card {
            background: linear-gradient(135deg, #4a5568, #2d3748);
            border: 2px solid #718096;
            border-radius: 8px;
            padding: 10px;
            width: 100px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .skill-card:hover {
            transform: translateY(-2px);
            border-color: #ffd700;
            box-shadow: 0 4px 8px rgba(255, 215, 0, 0.3);
        }
        .skill-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .skill-icon { font-size: 24px; }
        .skill-name { font-size: 12px; margin-top: 5px; color: white; }
        .skill-cost { font-size: 10px; color: #a0aec0; margin-top: 3px; }
        
        /* 事件弹窗 */
        #event-modal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 10px;
            padding: 20px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            pointer-events: auto;
            z-index: 1000;
        }
        #event-modal.active { display: block; }
        #event-title { font-size: 20px; font-weight: bold; margin-bottom: 10px; color: #2d3748; }
        #event-desc { font-size: 14px; color: #4a5568; margin-bottom: 20px; white-space: pre-line; }
        #event-options { display: flex; flex-direction: column; gap: 10px; }
        .event-option {
            background: #4a5568;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .event-option:hover { background: #2d3748; }
        
        /* 员工状态面板 */
        #employee-panel {
            position: absolute;
            top: 70px;
            left: 10px;
            background: rgba(45, 55, 72, 0.95);
            border-radius: 8px;
            padding: 10px;
            max-height: 400px;
            overflow-y: auto;
            pointer-events: auto;
        }
        .employee-card {
            background: #2d3748;
            border-radius: 5px;
            padding: 8px;
            margin-bottom: 8px;
            min-width: 200px;
        }
        .emp-name { font-size: 14px; font-weight: bold; color: white; }
        .emp-role { font-size: 12px; color: #a0aec0; }
        .emp-bar { 
            height: 6px; 
            background: #4a5568; 
            border-radius: 3px; 
            margin: 5px 0;
            overflow: hidden;
        }
        .emp-bar-fill { height: 100%; transition: width 0.3s; }
        .sanity-fill { background: #48bb78; }
        .fatigue-fill { background: #f56565; }
        .loyalty-fill { background: #4299e1; }
        .emp-state { 
            font-size: 11px; 
            padding: 2px 6px; 
            border-radius: 3px; 
            display: inline-block;
            margin-top: 3px;
        }
        .state-normal { background: #48bb78; }
        .state-stocking { background: #ecc94b; }
        .state-angry { background: #f56565; }
        .state-resigning { background: #9f7aea; }
        
        /* 游戏结束 */
        #game-over {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            pointer-events: auto;
            z-index: 2000;
        }
        #game-over.active { display: flex; }
        #game-over-title { font-size: 48px; margin-bottom: 20px; }
        #game-over-desc { font-size: 18px; color: #a0aec0; margin-bottom: 30px; }
        #restart-btn {
            background: #48bb78;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
        }
        #restart-btn:hover { background: #38a169; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="loading">
            <div>🎨 加载美术素材中...</div>
            <div id="loading-text">0/31</div>
        </div>
        
        <!-- UI 层 -->
        <div id="ui-layer">
            <!-- 顶部信息栏 -->
            <div id="top-bar">
                <div>
                    <span class="stat-label">📅 第</span>
                    <span class="stat-value" id="ui-day">1</span>
                    <span class="stat-label">天</span>
                </div>
                
                <div id="progress-container">
                    <div id="progress-bar"></div>
                </div>
                <div>
                    <span class="stat-label">📊 进度:</span>
                    <span class="stat-value" id="ui-progress">0%</span>
                </div>
                
                <div>
                    <span class="stat-label">⚡ MP:</span>
                    <span class="stat-value" id="ui-mp">100</span>
                </div>
                <div>
                    <span class="stat-label">💰 预算:</span>
                    <span class="stat-value" id="ui-budget">¥500</span>
                </div>
            </div>
            
            <!-- 员工状态面板 -->
            <div id="employee-panel"></div>
            
            <!-- 技能栏 -->
            <div id="skill-bar"></div>
        </div>
        
        <!-- 事件弹窗 -->
        <div id="event-modal">
            <div id="event-title"></div>
            <div id="event-desc"></div>
            <div id="event-options"></div>
        </div>
        
        <!-- 游戏结束 -->
        <div id="game-over">
            <div id="game-over-title"></div>
            <div id="game-over-desc"></div>
            <button id="restart-btn">再来一局</button>
        </div>
    </div>
    
    <!-- 游戏引擎 -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    
    <!-- 游戏代码 -->
    <script src="js/config/balance.js"></script>
    <script src="js/entities/Employee.js"></script>
    <script src="js/systems/SkillManager.js"></script>
    <script src="js/systems/EventSystem.js"></script>
    <script src="js/game.js"></script>
    
    <script>
        // ========== Phaser 配置 ==========
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            pixelArt: true,
            physics: {
                default: 'arcade',
                arcade: { debug: false }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);
        
        // ========== 游戏状态 ==========
        let mainGame;
        let tickTimer;
        const TICK_INTERVAL = 1000; // 1 秒 = 1 分钟游戏时间
        let loadedCount = 0;
        const totalAssets = 31;
        
        // ========== Phaser 回调 ==========
        function preload() {
            const loading = document.getElementById('loading');
            const loadingText = document.getElementById('loading-text');
            
            this.load.on('filecomplete', (key, type, data) => {
                loadedCount++;
                if (loadingText) {
                    loadingText.textContent = `加载中... ${loadedCount}/${totalAssets}`;
                }
            });
            
            this.load.on('complete', () => {
                loading.style.display = 'none';
            });
            
            // ========== 加载地板贴图 ==========
            this.load.image('floor_gray',  'assets/sprites/tilesets/floor_gray_tile.png');
            this.load.image('floor_wood',  'assets/sprites/tilesets/floor_wood_light.png');
            this.load.image('floor_dark',  'assets/sprites/tilesets/floor_wood_dark.png');
            this.load.image('floor_white', 'assets/sprites/tilesets/floor_white_tile.png');

            // ========== 加载真实美术素材 ==========
            // 按设计方案精确加载需要的素材 ID
            const assetBase = 'assets/sprites/microverse/Modern_Office_Singles_32x32_';

            // 办公桌 (ID 1-10)
            for (let i = 1; i <= 10; i++) {
                this.load.image(`desk_${i}`, `${assetBase}${i}.png`);
            }
            // 会议桌候选 (ID 41-50: L形/大型桌)
            for (let i = 41; i <= 50; i++) {
                this.load.image(`desk_${i}`, `${assetBase}${i}.png`);
            }
            // 椅子 (ID 61-75)
            for (let i = 61; i <= 75; i++) {
                this.load.image(`chair_${i}`, `${assetBase}${i}.png`);
            }
            // 植物 (ID 281-295)
            for (let i = 281; i <= 295; i++) {
                this.load.image(`plant_${i}`, `${assetBase}${i}.png`);
            }
            // 文件柜 (ID 101-125)
            for (let i = 101; i <= 125; i++) {
                this.load.image(`cabinet_${i}`, `${assetBase}${i}.png`);
            }
            // 显示器/电脑 (ID 141-165)
            for (let i = 141; i <= 165; i++) {
                this.load.image(`computer_${i}`, `${assetBase}${i}.png`);
            }
            // 沙发/休闲家具 (ID 181-220)
            for (let i = 181; i <= 220; i++) {
                this.load.image(`sofa_${i}`, `${assetBase}${i}.png`);
            }
            // 大型家具/接待台/隔断 (ID 221-260)
            for (let i = 221; i <= 260; i++) {
                this.load.image(`furniture_${i}`, `${assetBase}${i}.png`);
            }
            
            // 角色 (Pixel Agents 精灵表，112x96，7列x4行，每帧 16x24)
            for (let i = 0; i <= 5; i++) {
                this.load.spritesheet(`char_${i}`, `assets/sprites/pixel-agents/char_${i}.png`, {
                    frameWidth: 16,
                    frameHeight: 24
                });
            }
            
            // 状态图标（用代码生成）
            const gfx = this.make.graphics();
            // 摸鱼图标（鱼 - 蓝色椭圆）
            gfx.fillStyle(0x4299e1);
            gfx.fillEllipse(8, 8, 12, 8);
            gfx.generateTexture('icon_stocking', 16, 16);
            gfx.clear();
            // 暴躁图标（火 - 红色三角）
            gfx.fillStyle(0xf56565);
            gfx.fillTriangle(8, 2, 4, 14, 12, 14);
            gfx.generateTexture('icon_angry', 16, 16);
            gfx.clear();
            // 跑路图标（行李箱 - 紫色方块）
            gfx.fillStyle(0x9f7aea);
            gfx.fillRect(4, 6, 8, 6);
            gfx.lineStyle(1, 0xffffff);
            gfx.moveTo(8, 6);
            gfx.lineTo(8, 12);
            gfx.strokePath();
            gfx.generateTexture('icon_resigning', 16, 16);
            gfx.clear();
        }

        // ========== 游戏逻辑 ==========
        let gameScene; // 保存场景引用
        let furnitureGroup;   // 家具静态碰撞组
        let charactersGroup;  // 角色物理组
        
        function create() {
            gameScene = this;
            mainGame = new MainGame();
            mainGame.init(this);
            
            // 初始化物理组
            furnitureGroup = this.physics.add.staticGroup();
            charactersGroup = this.physics.add.group();

            createScene(this);
            createUI();
            
            // 全局拖拽处理
            this.input.on('pointermove', (pointer) => {
                if (dragTarget && dragTarget.sprite) {
                    dragTarget.sprite.x = pointer.x - dragOffset.x;
                    dragTarget.sprite.y = pointer.y - dragOffset.y;
                    // 拖拽时同步物理体位置
                    dragTarget.sprite.body.reset(dragTarget.sprite.x, dragTarget.sprite.y);
                }
            });
            
            this.input.on('pointerup', () => {
                if (dragTarget && dragTarget.sprite) {
                    dragTarget.deskPosition = { 
                        x: dragTarget.sprite.x, 
                        y: dragTarget.sprite.y 
                    };
                    dragTarget.sprite.setDepth(4);
                    dragTarget = null;
                }
            });
            
            tickTimer = this.time.addEvent({
                delay: TICK_INTERVAL,
                callback: gameTick,
                callbackScope: this,
                loop: true
            });

            // AI 行走定时器：每 2 秒更新一次目标点
            this.time.addEvent({
                delay: 2000,
                callback: updateAIMovement,
                callbackScope: this,
                loop: true
            });
            
            console.log('✅ 游戏启动！角色支持拖拽 & AI 自动行走，含物理碰撞');
        }

        let cursors;
        let dragTarget = null; // 当前拖拽的员工
        let dragOffset = { x: 0, y: 0 };
        
        function update() {
            if (!mainGame || !mainGame.employees) return;
            // 更新所有角色的动画方向（根据速度方向）
            mainGame.employees.forEach(emp => {
                if (!emp.sprite || dragTarget === emp) return;
                const body = emp.sprite.body;
                if (!body) return;
                const vx = body.velocity.x;
                const vy = body.velocity.y;
                const speed = Math.sqrt(vx*vx + vy*vy);
                const charKey = `char_${emp.charIndex}`;

                if (speed < 5) {
                    // 静止：播放 idle（第1帧）
                    emp.sprite.anims.stop();
                    emp.sprite.setFrame(0);
                } else {
                    // 行走：根据方向选动画
                    const animKey = `${charKey}_walk_down`;
                    if (!emp.sprite.anims.isPlaying || emp.sprite.anims.currentAnim?.key !== animKey) {
                        emp.sprite.play(animKey, true);
                    }
                    // 左右翻转
                    emp.sprite.setFlipX(vx < -5);
                }

                // 到达目标点后停止
                if (emp.aiTarget) {
                    const dx = emp.aiTarget.x - emp.sprite.x;
                    const dy = emp.aiTarget.y - emp.sprite.y;
                    if (Math.sqrt(dx*dx + dy*dy) < 8) {
                        emp.sprite.body.setVelocity(0, 0);
                        emp.aiTarget = null;
                    }
                }
            });
        }

        // ========== AI 行走系统 ==========
        // 各区域可行走的目标点（避开家具密集区）
        const WALK_WAYPOINTS = {
            work:    [ {x:240,y:370}, {x:530,y:370}, {x:240,y:490}, {x:530,y:490},
                       {x:390,y:390}, {x:300,y:430}, {x:480,y:430} ],
            meeting: [ {x:100,y:130}, {x:132,y:160}, {x:170,y:130}, {x:200,y:155} ],
            cafe:    [ {x:600,y:160}, {x:650,y:170}, {x:700,y:155}, {x:668,y:130} ],
            corridor:[ {x:200,y:565}, {x:400,y:565}, {x:600,y:565} ],
        };

        function updateAIMovement() {
            if (!mainGame || !mainGame.employees || !gameScene) return;

            mainGame.employees.forEach(emp => {
                if (!emp.sprite || dragTarget === emp) return;
                // 拖拽中不 AI 移动
                if (emp.isBeingDragged) return;

                // 根据员工状态决定目标区域
                let pool;
                if (emp.state === 'stocking') {
                    // 摸鱼 → 去休闲区
                    pool = WALK_WAYPOINTS.cafe;
                } else if (emp.state === 'angry') {
                    // 暴躁 → 在工作区踱步
                    pool = WALK_WAYPOINTS.work;
                } else {
                    // 正常 → 70% 工作区，20% 走廊，10% 会议室
                    const r = Math.random();
                    if (r < 0.7)       pool = WALK_WAYPOINTS.work;
                    else if (r < 0.9)  pool = WALK_WAYPOINTS.corridor;
                    else               pool = WALK_WAYPOINTS.meeting;
                }

                // 随机选一个目标点
                const target = pool[Math.floor(Math.random() * pool.length)];
                emp.aiTarget = target;

                // 用物理引擎移动（速度 40px/s）
                gameScene.physics.moveTo(emp.sprite, target.x, target.y, 40);
            });
        }
        
        // ========== 更新员工状态图标 ==========
        function updateEmployeeStateIcon(scene, emp) {
            if (!emp.sprite) return;
            
            if (emp.stateIcon) {
                emp.stateIcon.destroy();
                emp.stateIcon = null;
            }
            
            let iconKey = null;
            if (emp.state === 'angry') {
                iconKey = 'icon_angry';
            } else if (emp.state === 'stocking') {
                iconKey = 'icon_stocking';
            } else if (emp.state === 'resigning') {
                iconKey = 'icon_resigning';
            }
            
            if (iconKey) {
                const stateIcon = scene.add.image(emp.sprite.x + 25, emp.sprite.y - 25, iconKey);
                stateIcon.setDisplaySize(20, 20);
                stateIcon.setDepth(6);
                emp.stateIcon = stateIcon;
            }
        }
        
        function updateAllStateIcons(scene) {
            if (!scene || !mainGame.employees) return;
            mainGame.employees.forEach(emp => {
                updateEmployeeStateIcon(scene, emp);
            });
        }
        
        // ========== 区域效果系统 ==========
        function updateZoneEffects(scene) {
            if (!scene || !scene.zones || !mainGame.employees) return;
            
            mainGame.employees.forEach(emp => {
                if (!emp.sprite) return;
                
                const x = emp.sprite.x;
                const y = emp.sprite.y;
                
                // 检查是否在会议室
                const meeting = scene.zones.meeting;
                if (x >= meeting.x && x <= meeting.x + meeting.width &&
                    y >= meeting.y && y <= meeting.y + meeting.height) {
                    // 会议室效果：进度 +0.2，情绪 -0.3
                    if (Math.random() < 0.1) { // 10% 概率每分钟
                        emp.addProgress(0.2);
                        emp.changeSanity(-0.3, '开会');
                    }
                }
                
                // 检查是否在咖啡厅
                const cafe = scene.zones.cafe;
                if (x >= cafe.x && x <= cafe.x + cafe.width &&
                    y >= cafe.y && y <= cafe.y + cafe.height) {
                    // 咖啡厅效果：情绪 +0.5，疲劳 -0.3
                    if (Math.random() < 0.1) { // 10% 概率每分钟
                        emp.changeSanity(0.5, '喝咖啡');
                        emp.changeFatigue(-0.3, '喝咖啡');
                    }
                }
            });
        }
        
        // ========== 创建角色动画（简化版）==========
        function createCharacterAnimations(scene) {
            try {
                for (let i = 0; i <= 5; i++) {
                    const key = `char_${i}`;
                    
                    // 检查动画是否已存在
                    if (!scene.anims.exists(`char_${i}_walk_down`)) {
                        scene.anims.create({
                            key: `char_${i}_walk_down`,
                            frames: scene.anims.generateFrameNumbers(key, { start: 0, end: 6 }),
                            frameRate: 10,
                            repeat: -1
                        });
                    }
                }
            } catch(e) {
                console.warn('动画创建失败:', e);
            }
        }
        
        // ========== 场景创建（精确设计方案版）==========
        function createScene(scene) {
            const TILE = 32;

            // ── 1. 地板平铺 ──
            // 底层：浅木色地板铺满全场
            for (let x = 0; x < 800; x += TILE) {
                for (let y = 0; y < 600; y += TILE) {
                    scene.add.image(x + TILE/2, y + TILE/2, 'floor_wood').setDisplaySize(TILE, TILE).setDepth(0);
                }
            }
            // 会议室区域（左上）：白色地砖
            for (let x = 20; x < 250; x += TILE) {
                for (let y = 40; y < 230; y += TILE) {
                    scene.add.image(x + TILE/2, y + TILE/2, 'floor_white').setDisplaySize(TILE, TILE).setDepth(0);
                }
            }
            // 休闲区（右上）：灰色地砖
            for (let x = 550; x < 790; x += TILE) {
                for (let y = 40; y < 230; y += TILE) {
                    scene.add.image(x + TILE/2, y + TILE/2, 'floor_gray').setDisplaySize(TILE, TILE).setDepth(0);
                }
            }
            // 走廊（底部）：灰色地砖
            for (let x = 0; x < 800; x += TILE) {
                for (let y = 548; y < 600; y += TILE) {
                    scene.add.image(x + TILE/2, y + TILE/2, 'floor_gray').setDisplaySize(TILE, TILE).setDepth(0);
                }
            }

            // ── 2. 墙壁 & 踢脚线 ──
            const wallGfx = scene.add.graphics().setDepth(1);
            wallGfx.fillStyle(0xb8c4d0);
            wallGfx.fillRect(0, 0, 800, 40);
            wallGfx.fillRect(0, 0, 14, 600);
            wallGfx.fillRect(786, 0, 14, 600);
            wallGfx.fillStyle(0x8fa0b0);
            wallGfx.fillRect(0, 37, 800, 4);
            wallGfx.fillRect(0, 594, 800, 6);
            wallGfx.fillRect(14, 0, 4, 600);
            wallGfx.fillRect(782, 0, 4, 600);

            // ── 墙壁静态碰撞体（不可见，用于阻挡角色出界）──
            function addWallBlock(x, y, w, h) {
                const wall = scene.add.rectangle(x + w/2, y + h/2, w, h, 0x000000, 0);
                scene.physics.add.existing(wall, true); // true = static
                furnitureGroup.add(wall);
            }
            addWallBlock(0,   0,   800, 42);   // 上墙
            addWallBlock(0,   558, 800, 42);   // 下墙
            addWallBlock(0,   0,   16,  600);  // 左墙
            addWallBlock(784, 0,   16,  600);  // 右墙

            // ── 3. 区域隔断线 ──
            const divGfx = scene.add.graphics().setDepth(1);
            divGfx.lineStyle(2, 0x9ab0c0, 0.6);
            divGfx.lineBetween(250, 40, 250, 230);
            divGfx.lineBetween(550, 40, 550, 230);
            divGfx.lineBetween(14, 230, 786, 230);

            // ── 辅助函数：添加带碰撞的家具 ──
            function addFurniture(x, y, key, dw, dh, depth, collideW, collideH) {
                const img = scene.add.image(x, y, key).setDisplaySize(dw, dh).setDepth(depth);
                // 碰撞体（比显示尺寸略小，避免太卡）
                const cw = collideW || dw * 0.8;
                const ch = collideH || dh * 0.6;
                const body = scene.add.rectangle(x, y, cw, ch, 0xff0000, 0);
                scene.physics.add.existing(body, true);
                furnitureGroup.add(body);
                return img;
            }

            // ── 4. ① 会议室 ──
            const meetBg = scene.add.graphics().setDepth(1);
            meetBg.fillStyle(0xd0e4f4, 0.25);
            meetBg.fillRect(14, 40, 236, 190);

            addFurniture(132, 130, 'desk_43',      150, 64, 2, 140, 40);
            scene.add.image(82,  95, 'chair_61').setDisplaySize(36, 40).setDepth(2);
            scene.add.image(132, 95, 'chair_61').setDisplaySize(36, 40).setDepth(2);
            scene.add.image(182, 95, 'chair_61').setDisplaySize(36, 40).setDepth(2);
            scene.add.image(82,  168, 'chair_62').setDisplaySize(36, 40).setDepth(5);
            scene.add.image(132, 168, 'chair_62').setDisplaySize(36, 40).setDepth(5);
            scene.add.image(182, 168, 'chair_62').setDisplaySize(36, 40).setDepth(5);
            addFurniture(132, 52, 'furniture_225', 100, 28, 2, 90, 20);
            scene.add.image(22,  52, 'plant_281').setDisplaySize(38, 48).setDepth(2);
            scene.add.image(238, 52, 'plant_282').setDisplaySize(38, 48).setDepth(2);
            scene.add.text(132, 44, '📢 会议室', {
                font: 'bold 12px Arial', fill: '#1a3a5a',
                stroke: '#d0e4f4', strokeThickness: 3
            }).setOrigin(0.5, 0).setDepth(3);

            // ── 5. ② 休闲区 ──
            const cafeBg = scene.add.graphics().setDepth(1);
            cafeBg.fillStyle(0xf4e8d0, 0.25);
            cafeBg.fillRect(550, 40, 236, 190);

            addFurniture(600, 155, 'sofa_201', 72, 60, 2, 64, 30);
            addFurniture(680, 155, 'sofa_202', 72, 60, 2, 64, 30);
            addFurniture(640, 108, 'sofa_203', 60, 40, 2, 52, 25);
            addFurniture(640, 148, 'sofa_204', 50, 36, 3, 42, 20);
            scene.add.image(558, 52, 'plant_283').setDisplaySize(40, 50).setDepth(7);
            scene.add.image(778, 52, 'plant_284').setDisplaySize(40, 50).setDepth(7);
            scene.add.image(558, 200, 'plant_285').setDisplaySize(34, 42).setDepth(7);
            scene.add.text(668, 44, '☕ 休闲区', {
                font: 'bold 12px Arial', fill: '#5a2a00',
                stroke: '#f4e8d0', strokeThickness: 3
            }).setOrigin(0.5, 0).setDepth(3);

            // ── 6. ③ 文件柜墙（左侧）──
            const cabColors = [101, 102, 103, 104, 111, 112];
            for (let i = 0; i < 5; i++) {
                addFurniture(42, 270 + i * 60, `cabinet_${cabColors[i % cabColors.length]}`, 48, 56, 2, 44, 48);
            }
            // 文件柜墙（右侧）
            for (let i = 0; i < 4; i++) {
                addFurniture(758, 280 + i * 65, `cabinet_${113 + (i % 3)}`, 48, 56, 2, 44, 48);
            }

            // ── 7. ④ 主工作区 ──
            const workBg = scene.add.graphics().setDepth(1);
            workBg.fillStyle(0xeef4ee, 0.2);
            workBg.fillRect(70, 240, 660, 308);

            addFurniture(390, 295, 'furniture_231', 300, 18, 2, 280, 14);
            addFurniture(390, 430, 'furniture_231', 300, 18, 2, 280, 14);
            addFurniture(390, 362, 'furniture_232', 18, 120, 2, 14, 110);

            const positions = [
                { x: 240, y: 330 },
                { x: 530, y: 330 },
                { x: 240, y: 470 },
                { x: 530, y: 470 },
            ];

            mainGame.employees.forEach((emp, index) => {
                const pos = positions[index] || { x: 390, y: 400 };
                const x = pos.x;
                const y = pos.y;

                const deskId = (index % 4) + 1;
                addFurniture(x, y - 18, `desk_${deskId}`, 96, 52, 2, 86, 30);

                const monId = 141 + (index % 4);
                scene.add.image(x - 18, y - 30, `computer_${monId}`).setDisplaySize(32, 26).setDepth(3);
                scene.add.image(x + 22, y - 26, `computer_145`).setDisplaySize(24, 18).setDepth(3);

                // ── 角色改为物理精灵 ──
                const charIndex = index % 6;
                emp.charIndex = charIndex;
                const charKey = `char_${charIndex}`;
                const playerSprite = scene.physics.add.sprite(x, y + 28, charKey, 0);
                playerSprite.setDisplaySize(48, 72);
                // 物理体设置：矩形碰撞体（脚底部分）
                playerSprite.body.setSize(20, 20);
                playerSprite.body.setOffset(
                    (16 - 20) / 2,   // 水平居中（原始帧宽16）
                    24 - 20          // 贴脚底（原始帧高24）
                );
                playerSprite.body.setCollideWorldBounds(true);
                playerSprite.play(`char_${charIndex}_walk_down`);
                playerSprite.setDepth(4);
                playerSprite.setInteractive({ cursor: 'grab' });

                // 加入角色组（用于统一碰撞注册）
                charactersGroup.add(playerSprite);

                playerSprite.on('pointerdown', (pointer) => {
                    dragTarget = emp;
                    emp.isBeingDragged = true;
                    emp.sprite.body.setVelocity(0, 0);
                    dragOffset.x = pointer.x - playerSprite.x;
                    dragOffset.y = pointer.y - playerSprite.y;
                    playerSprite.setDepth(10);
                });
                playerSprite.on('pointerup', () => {
                    if (dragTarget === emp) {
                        dragTarget = null;
                        emp.isBeingDragged = false;
                        playerSprite.setDepth(4);
                        emp.deskPosition = { x: playerSprite.x, y: playerSprite.y };
                    }
                });

                emp.stateIcon = null;
                updateEmployeeStateIcon(scene, emp);

                const chairId = 63 + (index % 4);
                scene.add.image(x, y + 52, `chair_${chairId}`).setDisplaySize(44, 50).setDepth(5);

                emp.sprite = playerSprite;
                emp.deskPosition = { x, y };
                emp.aiTarget = null;
                emp.isBeingDragged = false;

                scene.add.text(x, y + 60, emp.name, {
                    font: 'bold 11px Arial', fill: '#1a2a3a',
                    stroke: '#ffffff', strokeThickness: 3
                }).setOrigin(0.5).setDepth(6);
                scene.add.text(x, y + 73, emp.role, {
                    font: '9px Arial', fill: '#4a6080'
                }).setOrigin(0.5).setDepth(6);
            });

            // ── 统一注册碰撞（角色 vs 家具）──
            scene.physics.add.collider(charactersGroup, furnitureGroup);

            // ── 8. ⑤ 底部走廊 ──
            addFurniture(400, 568, 'furniture_232', 120, 44, 2, 110, 30);
            scene.add.image(90,  570, 'plant_286').setDisplaySize(36, 44).setDepth(7);
            scene.add.image(710, 570, 'plant_287').setDisplaySize(36, 44).setDepth(7);
            scene.add.image(250, 570, 'plant_288').setDisplaySize(30, 38).setDepth(7);
            scene.add.image(550, 570, 'plant_289').setDisplaySize(30, 38).setDepth(7);

            // ── 9. 外框 ──
            const borderGfx = scene.add.graphics().setDepth(100);
            borderGfx.lineStyle(3, 0x3a4a5a, 1);
            borderGfx.strokeRect(0, 0, 800, 600);

            gameScene.zones = {
                meeting: { x: 14,  y: 40,  width: 236, height: 190, name: '会议室' },
                cafe:    { x: 550, y: 40,  width: 236, height: 190, name: '休闲区' }
            };

            console.log('✅ 场景装修完成：物理碰撞已启用，角色支持 AI 行走');
        }
        
        // ========== UI 系统 ==========
        function createUI() {
            createSkillBar();
            updateUI();
        }
        
        function createSkillBar() {
            const skillBar = document.getElementById('skill-bar');
            const skills = mainGame.skillManager.skills;
            
            Object.values(skills).forEach(skill => {
                const card = document.createElement('div');
                card.className = 'skill-card';
                card.id = `skill-${skill.id}`;
                card.innerHTML = `
                    <div class="skill-icon">${skill.icon}</div>
                    <div class="skill-name">${skill.name}</div>
                    <div class="skill-cost">${skill.costType === 'management' ? '⚡' : '💰'}${skill.cost}</div>
                `;
                card.onclick = () => useSkill(skill.id);
                skillBar.appendChild(card);
            });
        }
        
        function updateUI() {
            const status = mainGame.getStatus();
            
            document.getElementById('ui-day').textContent = status.day;
            document.getElementById('ui-progress').textContent = `${status.progressPercent}%`;
            document.getElementById('ui-mp').textContent = status.managementPoints;
            document.getElementById('ui-budget').textContent = `¥${status.budget}`;
            
            document.getElementById('progress-bar').style.width = `${status.progressPercent}%`;
            
            updateEmployeePanel();
            updateSkillButtons();
        }
        
        function updateEmployeePanel() {
            const panel = document.getElementById('employee-panel');
            panel.innerHTML = '';
            
            mainGame.employees.forEach(emp => {
                const card = document.createElement('div');
                card.className = 'employee-card';
                
                const stateClass = `state-${emp.state}`;
                const stateName = emp.getStateName(emp.state);
                
                card.innerHTML = `
                    <div class="emp-name">${emp.name}</div>
                    <div class="emp-role">${emp.role} | ${stateName}</div>
                    <div class="emp-bar"><div class="emp-bar-fill sanity-fill" style="width:${emp.sanity}%"></div></div>
                    <div class="emp-bar"><div class="emp-bar-fill fatigue-fill" style="width:${emp.fatigue}%"></div></div>
                    <div class="emp-bar"><div class="emp-bar-fill loyalty-fill" style="width:${emp.loyalty}%"></div></div>
                    <div class="emp-state ${stateClass}">${stateName}</div>
                `;
                
                panel.appendChild(card);
            });
        }
        
        function updateSkillButtons() {
            Object.values(mainGame.skillManager.skills).forEach(skill => {
                const card = document.getElementById(`skill-${skill.id}`);
                const canUse = mainGame.skillManager.canUseSkill(skill.id).can;
                card.classList.toggle('disabled', !canUse);
            });
        }
        
        function useSkill(skillId) {
            const result = mainGame.skillManager.useSkill(skillId);
            if (result.success) {
                updateUI();
            } else {
                alert(result.reason);
            }
        }
        
        // ========== 事件系统 ==========
        function showEventModal(event) {
            tickTimer.paused = true;
            
            const modal = document.getElementById('event-modal');
            const title = document.getElementById('event-title');
            const desc = document.getElementById('event-desc');
            const options = document.getElementById('event-options');
            
            title.textContent = `📢 ${event.name}`;
            desc.textContent = `${event.description}\n${event.target ? '目标：' + event.target.name : ''}`;
            
            options.innerHTML = '';
            event.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'event-option';
                btn.textContent = opt.text;
                if (opt.cost) {
                    const costText = [];
                    if (opt.cost.management) costText.push(`⚡${opt.cost.management}`);
                    if (opt.cost.budget) costText.push(`💰${opt.cost.budget}`);
                    btn.textContent += ` (${costText.join(', ')})`;
                }
                btn.onclick = () => {
                    mainGame.eventSystem.resolveEvent(event, index);
                    modal.classList.remove('active');
                    tickTimer.paused = false;
                    updateUI();
                };
                options.appendChild(btn);
            });
            
            modal.classList.add('active');
        }
        
        // ========== 游戏结束 ==========
        function checkGameOver() {
            const result = mainGame.checkGameOver();
            
            if (result) {
                const gameOverScreen = document.getElementById('game-over');
                const title = document.getElementById('game-over-title');
                const desc = document.getElementById('game-over-desc');
                
                if (result === 'win') {
                    title.textContent = '🎉 恭喜通关！';
                    title.style.color = '#48bb78';
                    desc.textContent = `项目提前完成！用了${mainGame.day}天`;
                } else if (result === 'lose') {
                    title.textContent = '❌ 游戏失败';
                    title.style.color = '#f56565';
                    desc.textContent = '项目黄了，下次努力吧...';
                } else {
                    title.textContent = '😐 勉强完成';
                    title.style.color = '#ecc94b';
                    desc.textContent = '项目完成了，但是延期了...';
                }
                
                gameOverScreen.classList.add('active');
                tickTimer.remove();
            }
        }
        
        document.getElementById('restart-btn').onclick = () => {
            location.reload();
        };
    </script>
</body>
</html>
