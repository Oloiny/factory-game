<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>大厂风云 - 职场抓马生存战 MVP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(ellipse at center, #1a1a3e 0%, #0d0d1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', 'Courier New', monospace;
        }

        /* 像素风全局字体大小修正（Press Start 2P 较大，统一缩小） */
        .px-text { font-family: 'Press Start 2P', monospace; }

        #game-container {
            border: 4px solid #ffd700;
            box-shadow: 0 0 0 2px #b8860b, 0 0 30px rgba(255,215,0,0.3), inset 0 0 0 2px #b8860b;
            position: relative;
            image-rendering: pixelated;
        }

        /* ── 加载屏 ── */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffd700;
            font-size: 14px;
            background: rgba(10,12,26,0.97);
            border: 3px solid #ffd700;
            box-shadow: 0 0 0 1px #b8860b, inset 0 0 20px rgba(255,215,0,0.05);
            padding: 40px 60px;
            z-index: 1000;
            text-align: center;
            image-rendering: pixelated;
        }
        #loading::before {
            content: '';
            display: block;
            width: 48px; height: 48px;
            margin: 0 auto 20px;
            background: url('assets/sprites/ui/skill_pie.png') center/contain no-repeat;
            image-rendering: pixelated;
            animation: spin 1s steps(8) infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-text {
            font-size: 9px;
            color: #a0aec0;
            margin-top: 15px;
            letter-spacing: 1px;
        }

        /* ── UI 覆盖层 ── */
        #ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* ── 顶部 HUD ── */
        #top-bar {
            background: url('assets/sprites/ui/hud_bg.png') left top / 800px 50px no-repeat;
            background-color: rgba(14,18,32,0.97);
            color: white;
            height: 50px;
            padding: 0 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
            border-bottom: 2px solid #b8860b;
            image-rendering: pixelated;
        }

        .hud-block {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 10px;
            border-right: 1px solid rgba(74,85,104,0.6);
        }
        .hud-block:last-child { border-right: none; }

        .hud-icon {
            width: 20px; height: 20px;
            image-rendering: pixelated;
        }
        .stat-label {
            font-size: 7px;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1;
        }
        .stat-value {
            font-size: 11px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 8px rgba(255,215,0,0.6);
            line-height: 1;
        }
        .stat-value.danger { color: #f56565 !important; text-shadow: 0 0 8px rgba(245,101,101,0.6); }

        /* 进度条 */
        #progress-container {
            flex: 1;
            margin: 0 12px;
            background: url('assets/sprites/ui/progress_bg.png') center/100% 100% no-repeat;
            background-color: #0d1220;
            border: 2px solid #2d3a55;
            height: 18px;
            overflow: hidden;
            position: relative;
            image-rendering: pixelated;
        }
        #progress-bar {
            height: 100%;
            background: url('assets/sprites/ui/progress_fill.png') left center / 400px 100% no-repeat;
            background-color: #48bb78;
            width: 0%;
            transition: width 0.4s steps(20);
            image-rendering: pixelated;
        }
        #progress-bar::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: rgba(255,255,255,0.25);
        }

        /* ── 技能栏 ── */
        #skill-bar {
            position: absolute;
            bottom: 8px;
            right: 8px;
            display: flex;
            gap: 8px;
            pointer-events: auto;
        }

        .skill-card {
            background: url('assets/sprites/ui/skill_card_bg.png') center/100% 100% no-repeat;
            background-color: rgba(28,35,55,0.95);
            border: 2px solid #4a5568;
            width: 96px;
            height: 88px;
            cursor: pointer;
            transition: transform 0.1s steps(2), border-color 0.1s;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            image-rendering: pixelated;
            position: relative;
        }
        .skill-card:hover {
            transform: translateY(-3px);
            border-color: #ffd700;
            box-shadow: 0 4px 0 #b8860b, 0 0 12px rgba(255,215,0,0.4);
        }
        .skill-card:active { transform: translateY(0px); box-shadow: none; }
        .skill-card.pending-target {
            border-color: #ffd700;
            box-shadow: 0 0 0 2px #ffd700, 0 0 16px rgba(255,215,0,0.6);
            animation: pulse-gold 0.6s steps(2) infinite;
        }
        @keyframes pulse-gold {
            0%  { box-shadow: 0 0 0 2px #ffd700, 0 0 16px rgba(255,215,0,0.6); }
            50% { box-shadow: 0 0 0 2px #b8860b, 0 0 8px rgba(255,215,0,0.2); }
        }
        .skill-card.disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(60%); }

        .skill-icon-img {
            width: 40px; height: 40px;
            image-rendering: pixelated;
        }
        .skill-name {
            font-size: 7px;
            color: #e2e8f0;
            line-height: 1.3;
            text-align: center;
            max-width: 88px;
        }
        .skill-cost {
            font-size: 7px;
            color: #a0aec0;
            background: rgba(0,0,0,0.4);
            padding: 1px 5px;
            border: 1px solid #4a5568;
        }

        /* ── 事件弹窗 ── */
        #event-modal {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: url('assets/sprites/ui/modal_bg.png') center/100% 100% no-repeat;
            background-color: rgba(14,18,32,0.98);
            border: 3px solid #ffd700;
            box-shadow: 0 0 0 1px #b8860b, 0 8px 32px rgba(0,0,0,0.8);
            padding: 0;
            width: 500px;
            pointer-events: auto;
            z-index: 1000;
            image-rendering: pixelated;
        }
        #event-modal.active { display: block; }

        #event-header {
            background: rgba(40,50,75,0.95);
            border-bottom: 2px solid #b8860b;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #event-title {
            font-size: 10px;
            color: #ffd700;
            text-shadow: 0 0 8px rgba(255,215,0,0.5);
            flex: 1;
        }

        #event-body { padding: 16px; }
        #event-desc {
            font-size: 9px;
            color: #cbd5e0;
            line-height: 2;
            margin-bottom: 16px;
            white-space: pre-line;
            background: rgba(0,0,0,0.3);
            border: 1px solid #2d3a55;
            padding: 10px;
        }
        #event-options { display: flex; flex-direction: column; gap: 8px; }

        .event-option {
            background: url('assets/sprites/ui/btn_bg.png') center/100% 100% no-repeat;
            background-color: rgba(45,55,80,0.95);
            color: #e2e8f0;
            border: 2px solid #4a5568;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 8px;
            font-family: 'Press Start 2P', monospace;
            line-height: 1.6;
            text-align: left;
            transition: border-color 0.1s, transform 0.1s steps(1);
            image-rendering: pixelated;
        }
        .event-option:hover {
            border-color: #ffd700;
            color: #ffd700;
            transform: translateX(4px);
        }
        .event-option:active { transform: translateX(2px); }

        /* ── 员工面板 ── */
        #employee-panel {
            position: absolute;
            top: 58px;
            left: 8px;
            background: rgba(14,18,32,0.92);
            border: 2px solid #2d3a55;
            border-top: 3px solid #4a6080;
            padding: 6px;
            max-height: 420px;
            overflow-y: auto;
            pointer-events: auto;
            scrollbar-width: thin;
            scrollbar-color: #4a5568 #1a2030;
        }
        #employee-panel::-webkit-scrollbar { width: 6px; }
        #employee-panel::-webkit-scrollbar-track { background: #1a2030; }
        #employee-panel::-webkit-scrollbar-thumb { background: #4a5568; }

        /* 面板标题 */
        #employee-panel::before {
            content: '👥 员工状态';
            display: block;
            font-size: 7px;
            color: #718096;
            padding: 2px 4px 6px;
            border-bottom: 1px solid #2d3a55;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .employee-card {
            background: rgba(22,28,45,0.95);
            border: 2px solid #2d3a55;
            border-left: 4px solid #48bb78;
            padding: 7px 8px;
            margin-bottom: 6px;
            min-width: 210px;
            cursor: default;
            transition: border-color 0.15s;
            display: grid;
            grid-template-columns: 44px 1fr;
            gap: 0 8px;
            align-items: start;
            image-rendering: pixelated;
        }
        .employee-card:hover { border-color: #4a6080; }
        .employee-card.target-selectable {
            cursor: pointer;
            border-color: #ffd700 !important;
            box-shadow: 0 0 8px rgba(255,215,0,0.3);
            animation: pulse-card 0.5s steps(2) infinite;
        }
        @keyframes pulse-card {
            0%  { background: rgba(22,28,45,0.95); }
            50% { background: rgba(40,50,30,0.95); }
        }

        /* 角色头像 */
        .emp-avatar {
            grid-row: 1 / 4;
            width: 40px; height: 52px;
            image-rendering: pixelated;
            border: 2px solid #2d3a55;
        }

        .emp-info { grid-column: 2; }
        .emp-name {
            font-size: 8px;
            font-weight: bold;
            color: #e2e8f0;
            margin-bottom: 2px;
        }
        .emp-role {
            font-size: 7px;
            color: #718096;
            margin-bottom: 4px;
        }

        /* 属性条 */
        .emp-bars { grid-column: 2; }
        .bar-row {
            display: flex;
            align-items: center;
            gap: 4px;
            margin: 2px 0;
        }
        .bar-label {
            font-size: 6px;
            color: #718096;
            width: 10px;
            text-align: right;
        }
        .emp-bar {
            flex: 1;
            height: 5px;
            background: #1a2030;
            border: 1px solid #2d3a55;
            overflow: hidden;
        }
        .emp-bar-fill { height: 100%; transition: width 0.4s steps(10); }
        .sanity-fill  { background: #48bb78; }
        .fatigue-fill { background: #f56565; }
        .loyalty-fill { background: #4299e1; }

        /* 状态徽章 */
        .emp-state-row { grid-column: 2; margin-top: 3px; }
        .emp-state {
            font-size: 6px;
            padding: 2px 5px;
            display: inline-flex;
            align-items: center;
            gap: 3px;
            border: 1px solid;
        }
        .state-normal   { color: #48bb78; border-color: #48bb78; background: rgba(72,187,120,0.1); }
        .state-stocking { color: #ecc94b; border-color: #ecc94b; background: rgba(236,201,75,0.1); }
        .state-angry    { color: #f56565; border-color: #f56565; background: rgba(245,101,101,0.1); }
        .state-resigning{ color: #9f7aea; border-color: #9f7aea; background: rgba(159,122,234,0.1); }

        /* 状态图标（小） */
        .state-icon-img {
            width: 12px; height: 12px;
            image-rendering: pixelated;
        }

        /* ── 游戏结束 ── */
        #game-over {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            pointer-events: auto;
            z-index: 2000;
        }
        #game-over.active { display: flex; }
        #game-over::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(255,215,0,0.03) 0px,
                rgba(255,215,0,0.03) 1px,
                transparent 1px,
                transparent 4px
            );
            pointer-events: none;
        }
        #game-over-title {
            font-size: 28px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px currentColor;
        }
        #game-over-desc {
            font-size: 10px;
            color: #a0aec0;
            margin-bottom: 36px;
            line-height: 2;
        }
        #restart-btn {
            background: rgba(45,55,80,0.95);
            color: #ffd700;
            border: 3px solid #ffd700;
            padding: 14px 36px;
            font-size: 11px;
            font-family: 'Press Start 2P', monospace;
            cursor: pointer;
            box-shadow: 0 4px 0 #b8860b;
            transition: transform 0.1s steps(1), box-shadow 0.1s;
        }
        #restart-btn:hover {
            background: rgba(60,75,100,0.95);
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #b8860b;
        }
        #restart-btn:active { transform: translateY(2px); box-shadow: none; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="loading">
            <div style="font-size:11px; letter-spacing:2px;">LOADING ASSETS...</div>
            <div id="loading-text">0 / 31</div>
        </div>
        
        <!-- UI 层 -->
        <div id="ui-layer">
            <!-- 顶部 HUD -->
            <div id="top-bar">
                <!-- 天数 -->
                <div class="hud-block">
                    <div>
                        <div class="stat-label">DAY</div>
                        <div class="stat-value" id="ui-day">1</div>
                    </div>
                </div>

                <!-- 进度条区域 -->
                <div class="hud-block" style="flex:1; flex-direction:column; align-items:stretch; gap:3px; border-right:none;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="stat-label">PROJECT PROGRESS</span>
                        <span class="stat-value" id="ui-progress" style="font-size:9px;">0%</span>
                    </div>
                    <div id="progress-container">
                        <div id="progress-bar"></div>
                    </div>
                </div>

                <!-- MP -->
                <div class="hud-block">
                    <div>
                        <div class="stat-label">MP</div>
                        <div class="stat-value" id="ui-mp">100</div>
                    </div>
                </div>

                <!-- 预算 -->
                <div class="hud-block">
                    <div>
                        <div class="stat-label">BUDGET</div>
                        <div class="stat-value" id="ui-budget">¥500</div>
                    </div>
                </div>

            </div>

            <!-- 员工状态面板 -->
            <div id="employee-panel"></div>
            
            <!-- 技能栏 -->
            <div id="skill-bar"></div>
        </div>
        
        <!-- 事件弹窗 -->
        <div id="event-modal">
            <div id="event-header">
                <div id="event-title"></div>
            </div>
            <div id="event-body">
                <div id="event-desc"></div>
                <div id="event-options"></div>
            </div>
        </div>
        
        <!-- 游戏结束 -->
        <div id="game-over">
            <div id="game-over-title"></div>
            <div id="game-over-desc"></div>
            <button id="restart-btn">再来一局</button>
        </div>
    </div>
    
    <!-- 游戏引擎 -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    
    <!-- 游戏代码 -->
    <script src="js/config/balance.js"></script>
    <script src="js/entities/Employee.js"></script>
    <script src="js/systems/SkillManager.js"></script>
    <script src="js/systems/EventSystem.js"></script>
    <script src="js/game.js"></script>
    
    <script>
        // ========== Phaser 配置 ==========
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            pixelArt: true,
            physics: {
                default: 'arcade',
                arcade: { debug: false }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);
        
        // ========== 游戏状态 ==========
        let mainGame;
        let tickTimer;
        const TICK_INTERVAL = 1000; // 1 秒 = 1 分钟游戏时间
        let loadedCount = 0;
        const totalAssets = 31;
        
        // ========== Phaser 回调 ==========
        function preload() {
            const loading = document.getElementById('loading');
            const loadingText = document.getElementById('loading-text');
            
            this.load.on('filecomplete', (key, type, data) => {
                loadedCount++;
                if (loadingText) {
                    loadingText.textContent = `加载中... ${loadedCount}/${totalAssets}`;
                }
            });
            
            this.load.on('complete', () => {
                loading.style.display = 'none';
            });
            
            // ========== 加载 Modern Interiors 真实素材 ==========
            // Room_Builder: 地板/墙壁 tileset (17x23 tiles, 544x736px)
            this.load.image('room_builder', 'assets/sprites/tilesets/Room_Builder_free_32x32.png');
            // Interiors: 家具 tileset (16x89 tiles, 512x2848px)
            this.load.image('interiors',    'assets/sprites/tilesets/Interiors_free_32x32.png');
            // 角色精灵表 (Modern Interiors 自带, 16x16 per frame)
            this.load.spritesheet('mi_adam',   'assets/sprites/tilesets/Adam_run_16x16.png',   { frameWidth: 16, frameHeight: 32 });
            this.load.spritesheet('mi_alex',   'assets/sprites/tilesets/Alex_run_16x16.png',   { frameWidth: 16, frameHeight: 32 });
            this.load.spritesheet('mi_amelia', 'assets/sprites/tilesets/Amelia_run_16x16.png', { frameWidth: 16, frameHeight: 32 });
            this.load.spritesheet('mi_bob',    'assets/sprites/tilesets/Bob_run_16x16.png',    { frameWidth: 16, frameHeight: 32 });
            
            // ========== 加载像素风 UI 图标（状态图标）==========
            this.load.image('icon_stocking',  'assets/sprites/ui/state_stocking.png');
            this.load.image('icon_angry',     'assets/sprites/ui/state_angry.png');
            this.load.image('icon_resigning', 'assets/sprites/ui/state_resigning.png');
            
            // 角色 (Pixel Agents 精灵表，112x96，7列x4行，每帧 16x24)
            for (let i = 0; i <= 5; i++) {
                this.load.spritesheet(`char_${i}`, `assets/sprites/pixel-agents/char_${i}.png`, {
                    frameWidth: 16,
                    frameHeight: 24
                });
            }
            
        }

        // ========== 游戏逻辑 ==========
        let gameScene; // 保存场景引用
        let furnitureGroup;   // 家具静态碰撞组
        let charactersGroup;  // 角色物理组
        
        function create() {
            gameScene = this;
            mainGame = new MainGame();
            mainGame.init(this);
            
            // 初始化物理组
            furnitureGroup = this.physics.add.staticGroup();
            charactersGroup = this.physics.add.group();

            createScene(this);
            createUI();
            
            // 全局拖拽处理
            this.input.on('pointermove', (pointer) => {
                if (dragTarget && dragTarget.sprite) {
                    dragTarget.sprite.x = pointer.x - dragOffset.x;
                    dragTarget.sprite.y = pointer.y - dragOffset.y;
                    // 拖拽时同步物理体位置
                    dragTarget.sprite.body.reset(dragTarget.sprite.x, dragTarget.sprite.y);
                }
            });
            
            this.input.on('pointerup', () => {
                if (dragTarget && dragTarget.sprite) {
                    dragTarget.deskPosition = { 
                        x: dragTarget.sprite.x, 
                        y: dragTarget.sprite.y 
                    };
                    dragTarget.sprite.setDepth(4);
                    dragTarget = null;
                }
            });
            
            tickTimer = this.time.addEvent({
                delay: TICK_INTERVAL,
                callback: gameTick,
                callbackScope: this,
                loop: true
            });

            // AI 行走定时器：每 2 秒更新一次目标点
            this.time.addEvent({
                delay: 2000,
                callback: updateAIMovement,
                callbackScope: this,
                loop: true
            });
            
            console.log('✅ 游戏启动！角色支持拖拽 & AI 自动行走，含物理碰撞');
        }

        let cursors;
        let dragTarget = null; // 当前拖拽的员工
        let dragOffset = { x: 0, y: 0 };
        
        function update() {
            if (!mainGame || !mainGame.employees) return;
            // 更新所有角色的动画方向（根据速度方向）
            mainGame.employees.forEach(emp => {
                if (!emp.sprite || dragTarget === emp) return;
                const body = emp.sprite.body;
                if (!body) return;
                const vx = body.velocity.x;
                const vy = body.velocity.y;
                const speed = Math.sqrt(vx*vx + vy*vy);
                const charKey = `char_${emp.charIndex}`;

                if (speed < 5) {
                    // 静止：播放 idle（第1帧）
                    emp.sprite.anims.stop();
                    emp.sprite.setFrame(0);
                } else {
                    // 行走：根据方向选动画
                    const animKey = `${charKey}_walk_down`;
                    if (!emp.sprite.anims.isPlaying || emp.sprite.anims.currentAnim?.key !== animKey) {
                        emp.sprite.play(animKey, true);
                    }
                    // 左右翻转
                    emp.sprite.setFlipX(vx < -5);
                }

                // 到达目标点后停止
                if (emp.aiTarget) {
                    const dx = emp.aiTarget.x - emp.sprite.x;
                    const dy = emp.aiTarget.y - emp.sprite.y;
                    if (Math.sqrt(dx*dx + dy*dy) < 8) {
                        emp.sprite.body.setVelocity(0, 0);
                        emp.aiTarget = null;
                    }
                }
            });
        }

        // ========== AI 行走系统 ==========
        // 各区域可行走的目标点（避开家具密集区）
        const WALK_WAYPOINTS = {
            work:    [ {x:240,y:370}, {x:530,y:370}, {x:240,y:490}, {x:530,y:490},
                       {x:390,y:390}, {x:300,y:430}, {x:480,y:430} ],
            meeting: [ {x:300,y:130}, {x:375,y:130}, {x:450,y:130}, {x:375,y:160}, {x:300,y:160}, {x:450,y:160} ],
            cafe:    [ {x:600,y:160}, {x:650,y:170}, {x:700,y:155}, {x:668,y:130} ],
            corridor:[ {x:200,y:565}, {x:400,y:565}, {x:600,y:565} ],
        };

        function updateAIMovement() {
            if (!mainGame || !mainGame.employees || !gameScene) return;

            mainGame.employees.forEach(emp => {
                if (!emp.sprite || dragTarget === emp) return;
                // 拖拽中不 AI 移动
                if (emp.isBeingDragged) return;

                // 根据员工状态决定目标区域
                let pool;
                if (emp.state === 'stocking') {
                    // 摸鱼 → 去休闲区
                    pool = WALK_WAYPOINTS.cafe;
                } else if (emp.state === 'angry') {
                    // 暴躁 → 在工作区踱步
                    pool = WALK_WAYPOINTS.work;
                } else {
                    // 正常 → 70% 工作区，20% 走廊，10% 会议室
                    const r = Math.random();
                    if (r < 0.7)       pool = WALK_WAYPOINTS.work;
                    else if (r < 0.9)  pool = WALK_WAYPOINTS.corridor;
                    else               pool = WALK_WAYPOINTS.meeting;
                }

                // 随机选一个目标点
                const target = pool[Math.floor(Math.random() * pool.length)];
                emp.aiTarget = target;

                // 用物理引擎移动（速度 40px/s）
                gameScene.physics.moveTo(emp.sprite, target.x, target.y, 40);
            });
        }
        
        // ========== 更新员工状态图标 ==========
        function updateEmployeeStateIcon(scene, emp) {
            if (!emp.sprite) return;
            
            if (emp.stateIcon) {
                emp.stateIcon.destroy();
                emp.stateIcon = null;
            }
            
            let iconKey = null;
            if (emp.state === 'angry') {
                iconKey = 'icon_angry';
            } else if (emp.state === 'stocking') {
                iconKey = 'icon_stocking';
            } else if (emp.state === 'resigning') {
                iconKey = 'icon_resigning';
            }
            
            if (iconKey) {
                const stateIcon = scene.add.image(emp.sprite.x + 25, emp.sprite.y - 25, iconKey);
                stateIcon.setDisplaySize(20, 20);
                stateIcon.setDepth(6);
                emp.stateIcon = stateIcon;
            }
        }
        
        function updateAllStateIcons(scene) {
            if (!scene || !mainGame.employees) return;
            mainGame.employees.forEach(emp => {
                updateEmployeeStateIcon(scene, emp);
            });
        }
        
        // ========== 区域效果系统 ==========
        function updateZoneEffects(scene) {
            if (!scene || !scene.zones || !mainGame.employees) return;
            
            mainGame.employees.forEach(emp => {
                if (!emp.sprite) return;
                
                const x = emp.sprite.x;
                const y = emp.sprite.y;
                
                // 检查是否在会议室
                const meeting = scene.zones.meeting;
                if (x >= meeting.x && x <= meeting.x + meeting.width &&
                    y >= meeting.y && y <= meeting.y + meeting.height) {
                    // 会议室效果：进度 +0.2，情绪 -0.3
                    if (Math.random() < 0.1) { // 10% 概率每分钟
                        emp.addProgress(0.2);
                        emp.changeSanity(-0.3, '开会');
                    }
                }
                
                // 检查是否在咖啡厅
                const cafe = scene.zones.cafe;
                if (x >= cafe.x && x <= cafe.x + cafe.width &&
                    y >= cafe.y && y <= cafe.y + cafe.height) {
                    // 咖啡厅效果：情绪 +0.5，疲劳 -0.3
                    if (Math.random() < 0.1) { // 10% 概率每分钟
                        emp.changeSanity(0.5, '喝咖啡');
                        emp.changeFatigue(-0.3, '喝咖啡');
                    }
                }
            });
        }
        
        // ========== 创建角色动画（简化版）==========

        // ========== 场景创建（精确设计方案版）==========
        function createScene(scene) {
            const TILE = 32;

            // ──────────────────────────────────────────────────────
            //  布局规划（800×600）
            //  左列（x:14~210）：上=健身房(y:40~280)，下=医务室(y:280~548)
            //  中上（x:210~540, y:40~230）：会议室
            //  右上（x:540~786, y:40~230）：休闲区
            //  中下大区（x:210~786, y:230~548）：开放工位区
            //  底部走廊（y:548~600）
            // ──────────────────────────────────────────────────────

            // ── 辅助：从 tileset 裁剪一块贴图 ──
            // key: 'interiors' 或 'room_builder'
            // col,row: 格子坐标（32px/格）；w,h: 格子数
            function tile(key, col, row, w, h) {
                // 返回一个临时 RenderTexture，裁出指定区域
                const T2 = 32;
                const rt = scene.add.renderTexture(0, 0, w * T2, h * T2);
                rt.draw(key, -col * T2, -row * T2);
                rt.setVisible(false);
                // 实际上用 image + setCrop 更高效
                rt.destroy();
                // 直接用 image 加 setCrop 方式
                return null; // placeholder
            }

            // ── 辅助：添加从 tileset 裁剪的图像 ──
            function addTile(key, col, row, tw, th, px, py, dw, dh, depth) {
                const T2 = 32;
                const img = scene.add.image(px, py, key)
                    .setCrop(col * T2, row * T2, tw * T2, th * T2)
                    .setDisplaySize(dw || tw * T2, dh || th * T2)
                    .setDepth(depth || 2)
                    .setOrigin(0.5, 0.5);
                return img;
            }

            // ── 辅助：添加带碰撞的 tileset 家具 ──
            function addFurnitureTile(key, col, row, tw, th, px, py, dw, dh, depth) {
                const img = addTile(key, col, row, tw, th, px, py, dw, dh, depth);
                const cw = (dw || tw*32) * 0.75;
                const ch = (dh || th*32) * 0.55;
                const body = scene.add.rectangle(px, py, cw, ch, 0xff0000, 0);
                scene.physics.add.existing(body, true);
                furnitureGroup.add(body);
                return img;
            }

            // ── 辅助：添加带碰撞的家具（兼容旧调用）──
            function addFurniture(x, y, key, dw, dh, depth, collideW, collideH) {
                // 此函数现在仅用于纯色矩形占位（不再有虚假 key）
                const body = scene.add.rectangle(x, y, collideW||dw*0.8, collideH||dh*0.6, 0x000000, 0);
                scene.physics.add.existing(body, true);
                furnitureGroup.add(body);
            }

            // ── 1. 地板平铺（Room_Builder tileset）──
            // Room_Builder 地板坐标（经过实际图像确认）：
            //   木地板深色: col=0,row=1  木地板浅色: col=1,row=1
            //   灰色地砖:   col=2,row=1  白色地砖:   col=3,row=1
            //   棕色地板:   col=0,row=2
            function tileFloor(col, row, x0, y0, x1, y1) {
                for (let x = x0; x < x1; x += TILE) {
                    for (let y = y0; y < y1; y += TILE) {
                        scene.add.image(x + TILE/2, y + TILE/2, 'room_builder')
                            .setCrop(col*TILE, row*TILE, TILE, TILE)
                            .setDisplaySize(TILE, TILE)
                            .setDepth(0);
                    }
                }
            }
            // 全场底层：浅木地板 (col=1,row=1)
            tileFloor(1, 1, 0, 0, 800, 600);
            // 健身房（深棕木地板 col=0,row=2）
            tileFloor(0, 2, 14, 40, 210, 280);
            // 医务室（白色地砖 col=3,row=1）
            tileFloor(3, 1, 14, 280, 210, 548);
            // 会议室（灰色地砖 col=2,row=1）
            tileFloor(2, 1, 210, 40, 540, 230);
            // 休闲区（棕色地板 col=4,row=1）
            tileFloor(4, 1, 540, 40, 786, 230);
            // 走廊（深灰地砖 col=5,row=1）
            tileFloor(5, 1, 0, 548, 800, 600);

            // ── 2. 墙壁（Room_Builder tileset）──
            // 上墙: col=0,row=0（顶部墙砖）
            for (let x = 0; x < 800; x += TILE) {
                scene.add.image(x + TILE/2, 21, 'room_builder')
                    .setCrop(0, 0, TILE, TILE).setDisplaySize(TILE, TILE*1.3).setDepth(1);
            }
            // 左墙: col=0,row=3
            for (let y = 42; y < 558; y += TILE) {
                scene.add.image(8, y + TILE/2, 'room_builder')

            }
            // 右墙（翻转）
            for (let y = 42; y < 558; y += TILE) {
                scene.add.image(792, y + TILE/2, 'room_builder')
                    .setCrop(0, 3*TILE, TILE/2, TILE).setDisplaySize(TILE/2, TILE).setDepth(1).setFlipX(true);
            }
            // 底墙
            for (let x = 0; x < 800; x += TILE) {
                scene.add.image(x + TILE/2, 563, 'room_builder')

            // ── 墙壁静态碰撞体 ──

            divGfx.lineBetween(14,  280, 210, 280);
            divGfx.lineBetween(540, 40,  540, 230);
            divGfx.lineBetween(210, 230, 786, 230);

            // ════════════════════════════════════════════════════
            // ── 4. ① 健身房（左上，x:14~210, y:40~280）──
            // ════════════════════════════════════════════════════
            // 跑步机 → 用 Interiors 行36 col6-7 (2x2, 运动器材)
            addFurnitureTile('interiors', 6, 36, 2, 2, 65,  78, 64, 64, 2);

            // 哑铃架 → Interiors 行44 col1-2 (2x2, 储物柜)
            addFurnitureTile('interiors', 1, 44, 2, 2, 42,  168, 56, 56, 2);
            // 瑜伽垫 → Interiors 行42 col0-3 (4x2, 地毯)
            addFurnitureTile('interiors', 0, 42, 4, 2, 130, 200, 128, 64, 2);
            // 植物装饰 → Interiors 行44 col9-10 (2x2, 植物)
            addTile('interiors', 9, 44, 2, 2, 22,  60, 48, 48, 2);
            addTile('interiors', 9, 44, 2, 2, 196, 60, 48, 48, 2);
            addTile('interiors', 9, 44, 2, 2, 196, 258, 40, 40, 2);
            scene.add.text(112, 44, '🏋️ 健身房', {
                font: 'bold 11px Arial', fill: '#c8a060',
                stroke: '#1a0a00', strokeThickness: 3
            }).setOrigin(0.5, 0).setDepth(3);

            // ════════════════════════════════════════════════════
            // ── 5. ② 医务室（左下，x:14~210, y:280~548）──
            // ════════════════════════════════════════════════════
            // 诊疗床 → Interiors 行0 col0-1 (2x2, 床)
            addFurnitureTile('interiors', 0, 0, 2, 2, 112, 355, 96, 64, 2);
            // 医疗柜 → Interiors 行5 col0-1 (2x2, 白色书柜)
            addFurnitureTile('interiors', 0, 5, 2, 2, 42,  310, 56, 64, 2);
            addFurnitureTile('interiors', 0, 5, 2, 2, 42,  390, 56, 64, 2);
            // 医生桌+电脑 → Interiors 行36 col1-2 (2x2, 办公桌)
            addFurnitureTile('interiors', 1, 36, 2, 2, 155, 465, 80, 64, 2);
            // 植物
            addTile('interiors', 9, 44, 2, 2, 196, 295, 40, 40, 2);

            scene.add.text(112, 284, '🏥 医务室', {

            // ════════════════════════════════════════════════════
            // ── 6. ③ 会议室（中上，x:210~540, y:40~230）──
            // ════════════════════════════════════════════════════
            // 会议桌 → Interiors 行36 col4-7 (4x2, 大型办公桌)
            addFurnitureTile('interiors', 4, 36, 4, 2, 375, 130, 200, 64, 2);
            // 上排椅子（正面）→ Interiors 行38 col0 (1x2)
            for (const cx of [280, 320, 375, 430, 470]) {
                addTile('interiors', 0, 38, 1, 2, cx, 95, 28, 40, 2);
            }
            // 下排椅子（背面，翻转）→ Interiors 行38 col0 (1x2)
            for (const cx of [280, 320, 375, 430, 470]) {

            // ════════════════════════════════════════════════════
            // ── 7. ④ 休闲区（右上，x:540~786, y:40~230）──
            // ════════════════════════════════════════════════════

            addFurnitureTile('interiors', 1, 72, 2, 3, 590, 150, 72, 96, 2);

            // ── 8. ⑤ 文件柜墙（右侧）──

            for (let i = 0; i < 5; i++) {

        function exitTargetSelectMode() {
            if (pendingSkillId) {
                const card = document.getElementById(`skill-${pendingSkillId}`);
                if (card) card.classList.remove('pending-target');
            }
            pendingSkillId = null;
            updateEmployeePanel();
        }

        function showToast(msg, duration = 2500) {
            let toast = document.getElementById('toast-msg');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast-msg';
                toast.style.cssText = `
                    position:absolute; bottom:105px; left:50%; transform:translateX(-50%);
                    background:rgba(14,18,32,0.97);
                    color:#ffd700;
                    border:2px solid #ffd700;
                    box-shadow:0 0 0 1px #b8860b, 3px 3px 0 #b8860b;
                    padding:8px 18px;
                    font-family:'Press Start 2P',monospace;
                    font-size:8px;
                    letter-spacing:1px;
                    z-index:500;
                    pointer-events:none;
                    white-space:nowrap;
                    image-rendering:pixelated;
                `;
                document.getElementById('ui-layer').appendChild(toast);
            }
            toast.textContent = msg;
            toast.style.display = 'block';
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => { toast.style.display = 'none'; }, duration);
        }

        function createUI() {
            createSkillBar();
            updateUI();
        }
        
        // 技能 ID → 像素图标映射
        const SKILL_ICON_MAP = {
            'draw_pie':      'assets/sprites/ui/skill_pie.png',
            'team_dinner':   'assets/sprites/ui/skill_dinner.png',
            'airdrop_exec':  'assets/sprites/ui/skill_executive.png',
            'force_leave':   'assets/sprites/ui/skill_vacation.png',
            'emergency_mtg': 'assets/sprites/ui/skill_meeting.png',
        };

        function createSkillBar() {
            const skillBar = document.getElementById('skill-bar');
            const skills = mainGame.skillManager.skills;
            
            Object.values(skills).forEach(skill => {
                const iconSrc = SKILL_ICON_MAP[skill.id] || '';
                const costLabel = skill.costType === 'management' ? '⚡' : '¥';
                const card = document.createElement('div');
                card.className = 'skill-card';
                card.id = `skill-${skill.id}`;
                card.innerHTML = `
                    ${iconSrc
                        ? `<img class="skill-icon-img" src="${iconSrc}" alt="${skill.name}">`
                        : `<div style="font-size:28px;line-height:1">${skill.icon || '❓'}</div>`
                    }
                    <div class="skill-name">${skill.name}</div>
                    <div class="skill-cost">${costLabel}${skill.cost}</div>
                `;
                card.onclick = () => useSkill(skill.id);
                skillBar.appendChild(card);
            });
        }
        
        function updateUI() {
            const status = mainGame.getStatus();
            
            document.getElementById('ui-day').textContent = status.day;
            document.getElementById('ui-progress').textContent = `${status.progressPercent}%`;
            document.getElementById('ui-mp').textContent = status.managementPoints;
            document.getElementById('ui-budget').textContent = `¥${status.budget}`;
            
            document.getElementById('progress-bar').style.width = `${status.progressPercent}%`;
            
            updateEmployeePanel();
            updateSkillButtons();
        }
        
        // 状态 → 像素图标映射
        const STATE_ICON_MAP = {
            'stocking':  'assets/sprites/ui/state_stocking.png',
            'angry':     'assets/sprites/ui/state_angry.png',
            'resigning': 'assets/sprites/ui/state_resigning.png',
        };
        // 状态 → 左侧色条颜色
        const STATE_BORDER_COLOR = {
            'normal':    '#48bb78',
            'stocking':  '#ecc94b',
            'angry':     '#f56565',
            'resigning': '#9f7aea',
        };

        function updateEmployeePanel() {
            const panel = document.getElementById('employee-panel');
            panel.innerHTML = '';
            
            mainGame.employees.forEach((emp, idx) => {
                const card = document.createElement('div');
                card.className = 'employee-card';
                if (pendingSkillId) card.classList.add('target-selectable');

                const stateColor = STATE_BORDER_COLOR[emp.state] || '#48bb78';
                card.style.borderLeftColor = stateColor;

                const stateName  = emp.getStateName(emp.state);
                const stateClass = `state-${emp.state}`;
                const avatarSrc  = `assets/sprites/ui/avatar_${emp.charIndex !== undefined ? emp.charIndex : idx % 6}.png`;
                const stateIconSrc = STATE_ICON_MAP[emp.state] || '';
                const stateIconHtml = stateIconSrc
                    ? `<img class="state-icon-img" src="${stateIconSrc}" alt="${stateName}">`
                    : '';

                card.innerHTML = `
                    <img class="emp-avatar" src="${avatarSrc}" alt="${emp.name}">
                    <div class="emp-info">
                        <div class="emp-name">${emp.name}</div>
                        <div class="emp-role">${emp.role}</div>
                    </div>
                    <div class="emp-bars">
                        <div class="bar-row">
                            <span class="bar-label" title="情绪">😊</span>
                            <div class="emp-bar"><div class="emp-bar-fill sanity-fill" style="width:${emp.sanity}%"></div></div>
                        </div>
                        <div class="bar-row">
                            <span class="bar-label" title="疲劳">💤</span>
                            <div class="emp-bar"><div class="emp-bar-fill fatigue-fill" style="width:${emp.fatigue}%"></div></div>
                        </div>
                        <div class="bar-row">
                            <span class="bar-label" title="忠诚">❤️</span>
                            <div class="emp-bar"><div class="emp-bar-fill loyalty-fill" style="width:${emp.loyalty}%"></div></div>
                        </div>
                    </div>
                    <div class="emp-state-row">
                        <span class="emp-state ${stateClass}">${stateIconHtml}${stateName}</span>
                    </div>
                `;
                
                card.onclick = () => {
                    if (pendingSkillId) {
                        const skillId = pendingSkillId;
                        exitTargetSelectMode();
                        const result = mainGame.skillManager.useSkill(skillId, emp);
                        if (result.success) {
                            showToast(`✅ ${mainGame.skillManager.skills[skillId].name} → ${emp.name}`);
                            updateUI();
                        } else {
                            showToast(`❌ ${result.reason}`);
                        }
                    }
                };
                
                panel.appendChild(card);
            });
        }
        
        function updateSkillButtons() {
            Object.values(mainGame.skillManager.skills).forEach(skill => {
                const card = document.getElementById(`skill-${skill.id}`);
                const canUse = mainGame.skillManager.canUseSkill(skill.id).can;
                card.classList.toggle('disabled', !canUse);
            });
        }
        
        function useSkill(skillId) {
            const skill = mainGame.skillManager.skills[skillId];
            if (!skill) return;

            // 如果正在选目标，按 Esc 逻辑取消
            if (pendingSkillId === skillId) {
                exitTargetSelectMode();
                showToast('❎ 已取消');
                return;
            }

            // 检查资源是否足够（不检查 target）
            const check = mainGame.skillManager.canUseSkill(skillId, skill.target === 'single' ? {} : null);
            if (!check.can && check.reason !== '需要选择目标') {
                showToast(`❌ ${check.reason}`);
                return;
            }

            // 单体技能：进入目标选择模式
            if (skill.target === 'single') {
                enterTargetSelectMode(skillId);
                return;
            }

            // AOE / summon 技能：直接执行
            const result = mainGame.skillManager.useSkill(skillId);
            if (result.success) {
                showToast(`✅ ${skill.name} 已使用！`);
                updateUI();
            } else {
                showToast(`❌ ${result.reason}`);
            }
        }
        
        // ========== 事件系统 ==========
        function showEventModal(event) {
            tickTimer.paused = true;
            
            const modal = document.getElementById('event-modal');
            const title = document.getElementById('event-title');
            const desc = document.getElementById('event-desc');
            const options = document.getElementById('event-options');
            
            title.textContent = `📢 ${event.name}`;
            desc.textContent = `${event.description}\n${event.target ? '目标：' + event.target.name : ''}`;
            
            options.innerHTML = '';
            event.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'event-option';
                btn.textContent = opt.text;
                if (opt.cost) {
                    const costText = [];
                    if (opt.cost.management) costText.push(`⚡${opt.cost.management}`);
                    if (opt.cost.budget) costText.push(`💰${opt.cost.budget}`);
                    btn.textContent += ` (${costText.join(', ')})`;
                }
                btn.onclick = () => {
                    mainGame.eventSystem.resolveEvent(event, index);
                    modal.classList.remove('active');
                    tickTimer.paused = false;
                    updateUI();
                };
                options.appendChild(btn);
            });
            
            modal.classList.add('active');
        }
        
        // ========== 游戏主循环 Tick ==========
        let minuteCounter = 0; // 每60次tick = 1天

        function gameTick() {
            if (!mainGame || mainGame.gameOver) return;

            minuteCounter++;

            // 每 60 秒 = 1 游戏天
            if (minuteCounter >= 60) {
                minuteCounter = 0;
                mainGame.day++;
                mainGame.eventSystem.nextDay();

                // 触发并显示事件
                const events = mainGame.eventSystem.checkDailyEvents();
                if (events.length > 0) {
                    showEventModal(events[0]);
                }

                console.log(`📅 第${mainGame.day}天`);
            }

            // 每 tick 执行游戏逻辑
            mainGame.tick();

            // 更新区域效果
            updateZoneEffects(gameScene);

            // 更新状态图标
            updateAllStateIcons(gameScene);

            // 更新 UI
            updateUI();

            // 检查胜负
            checkGameOver();
        }

        // ========== 游戏结束 ==========
        function checkGameOver() {
            const result = mainGame.checkGameOver();
            
            if (result) {
                const gameOverScreen = document.getElementById('game-over');
                const title = document.getElementById('game-over-title');
                const desc = document.getElementById('game-over-desc');
                
                if (result === 'win') {
                    title.textContent = '🎉 恭喜通关！';
                    title.style.color = '#48bb78';
                    desc.textContent = `项目提前完成！用了${mainGame.day}天`;
                } else if (result === 'lose') {
                    title.textContent = '❌ 游戏失败';
                    title.style.color = '#f56565';
                    desc.textContent = '项目黄了，下次努力吧...';
                } else {
                    title.textContent = '😐 勉强完成';
                    title.style.color = '#ecc94b';
                    desc.textContent = '项目完成了，但是延期了...';
                }
                
                gameOverScreen.classList.add('active');
                tickTimer.remove();
            }
        }
        
        document.getElementById('restart-btn').onclick = () => {
            location.reload();
        };
    </script>
</body>
</html>
