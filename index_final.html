<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>长安文豪会 - 最终版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #1a1a2e; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }
        #game-container { 
            border: 4px solid #8b4513; 
            border-radius: 8px; 
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            pixelArt: false,
            physics: {
                default: 'arcade',
                arcade: { debug: false }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);
        let player, cursors, agents = [];

        function preload() {
            // 加载角色动画
            this.load.atlas('characters', 
                'assets/characters/atlas.png',
                'assets/characters/atlas.json'
            );
            
            // 加载头像
            this.load.image('libai_face', 'assets/characters/Klaus_Mueller.png');
            this.load.image('dufu_face', 'assets/characters/Maria_Lopez.png');
            this.load.image('sushi_face', 'assets/characters/Isabella_Rodriguez.png');
        }

        function create() {
            // 绘制完整场景
            drawScene(this);
            
            // 创建动画
            createAnimations(this);
            
            // 玩家
            player = this.physics.add.sprite(400, 300, 'characters', 'down-walk.000');
            player.setDepth(10);
            player.setCollideWorldBounds(true);
            
            // 其他 Agent
            const dufu = this.physics.add.sprite(350, 350, 'characters', 'down-walk.000');
            const sushi = this.physics.add.sprite(450, 350, 'characters', 'down-walk.000');
            
            agents = [dufu, sushi];
            
            // 相机
            this.cameras.main.startFollow(player, true, 0.05, 0.05);
            this.cameras.main.setBounds(0, 0, 1200, 900);
            this.physics.world.setBounds(0, 0, 1200, 900);
            
            // 键盘
            cursors = this.input.keyboard.createCursorKeys();
            
            // UI
            createUI(this);
        }

        function drawScene(scene) {
            const gfx = scene.add.graphics();
            
            // 地面 - 草地渐变
            const groundGradient = gfx.createLinearGradient(0, 0, 0, 900);
            groundGradient.colorStep(0, 0x3d5c3d);
            groundGradient.colorStep(1, 0x2d4a2d);
            gfx.fillStyle(groundGradient);
            gfx.fillRect(0, 0, 1200, 900);
            
            // 石板路
            gfx.fillStyle(0x8b8b8b);
            gfx.fillRect(350, 0, 100, 900);
            gfx.fillStyle(0x7a7a7a);
            for (let y = 0; y < 900; y += 40) {
                gfx.fillRect(355, y, 90, 30);
            }
            
            // 河流
            gfx.fillStyle(0x4a90a4);
            gfx.fillRect(0, 500, 1200, 80);
            gfx.fillStyle(0x5ba0b4);
            for (let x = 0; x < 1200; x += 30) {
                gfx.fillCircle(x, 520, 15);
            }
            
            // 桥
            gfx.fillStyle(0x8b4513);
            gfx.fillRect(340, 490, 120, 100);
            gfx.fillStyle(0x654321);
            for (let x = 350; x < 450; x += 20) {
                gfx.fillRect(x, 495, 15, 90);
            }
            
            // 建筑 - 中式房屋
            drawHouse(scene, 100, 100, 0);
            drawHouse(scene, 800, 150, 1);
            drawHouse(scene, 200, 650, 2);
            drawHouse(scene, 900, 700, 3);
            
            // 树
            for (let i = 0; i < 30; i++) {
                const x = Phaser.Math.Between(50, 1150);
                const y = Phaser.Math.Between(50, 850);
                if (Math.abs(x - 400) > 100) { // 避开道路
                    drawTree(scene, x, y);
                }
            }
            
            // 花
            for (let i = 0; i < 50; i++) {
                const x = Phaser.Math.Between(50, 1150);
                const y = Phaser.Math.Between(50, 850);
                drawFlower(scene, x, y);
            }
            
            // 灯笼
            drawLantern(scene, 320, 200);
            drawLantern(scene, 480, 200);
            drawLantern(scene, 320, 700);
            drawLantern(scene, 480, 700);
        }

        function drawHouse(scene, x, y, rotation) {
            const gfx = scene.add.graphics();
            
            // 地基
            gfx.fillStyle(0x654321);
            gfx.fillRect(x, y + 80, 120, 40);
            
            // 墙壁
            gfx.fillStyle(0xf5deb3);
            gfx.fillRect(x + 10, y + 40, 100, 40);
            
            // 屋顶
            gfx.fillStyle(0x8b0000);
            gfx.fillTriangle(x, y + 40, x + 60, y, x + 120, y + 40);
            
            // 门
            gfx.fillStyle(0x654321);
            gfx.fillRect(x + 45, y + 55, 30, 25);
            
            // 窗
            gfx.fillStyle(0x8b4513);
            gfx.fillRect(x + 20, y + 50, 15, 15);
            gfx.fillRect(x + 85, y + 50, 15, 15);
            
            // 装饰
            gfx.lineStyle(2, 0x654321);
            gfx.strokeRect(x + 10, y + 40, 100, 40);
        }

        function drawTree(scene, x, y) {
            const gfx = scene.add.graphics();
            
            // 树干
            gfx.fillStyle(0x5d4037);
            gfx.fillRect(x - 8, y + 20, 16, 30);
            
            // 树叶
            gfx.fillStyle(0x2e7d32);
            gfx.fillCircle(x, y + 10, 25);
            gfx.fillStyle(0x1b5e20);
            gfx.fillCircle(x - 10, y + 5, 15);
            gfx.fillCircle(x + 10, y + 5, 15);
        }

        function drawFlower(scene, x, y) {
            const gfx = scene.add.graphics();
            const colors = [0xff6b6b, 0xffd93d, 0x6bcb77, 0x4d96ff, 0xff6b9d];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            gfx.fillStyle(0x2e7d32);
            gfx.fillRect(x - 1, y + 5, 2, 10);
            
            gfx.fillStyle(color);
            gfx.fillCircle(x, y, 4);
        }

        function drawLantern(scene, x, y) {
            const gfx = scene.add.graphics();
            
            // 柱子
            gfx.fillStyle(0x654321);
            gfx.fillRect(x - 3, y, 6, 60);
            
            // 灯笼
            gfx.fillStyle(0xff4444);
            gfx.fillCircle(x, y, 15);
            
            // 光晕
            gfx.fillStyle(0xffff00, 0.3);
            gfx.fillCircle(x, y, 25);
        }

        function createAnimations(scene) {
            scene.anims.create({
                key: 'walk-down',
                frames: scene.anims.generateFrameNames('characters', {
                    prefix: 'down-walk.',
                    start: 0,
                    end: 3,
                    zeroPad: 3
                }),
                frameRate: 10,
                repeat: -1
            });
            
            scene.anims.create({
                key: 'walk-up',
                frames: scene.anims.generateFrameNames('characters', {
                    prefix: 'up-walk.',
                    start: 0,
                    end: 3,
                    zeroPad: 3
                }),
                frameRate: 10,
                repeat: -1
            });
            
            scene.anims.create({
                key: 'walk-left',
                frames: scene.anims.generateFrameNames('characters', {
                    prefix: 'left-walk.',
                    start: 0,
                    end: 3,
                    zeroPad: 3
                }),
                frameRate: 10,
                repeat: -1
            });
            
            scene.anims.create({
                key: 'walk-right',
                frames: scene.anims.generateFrameNames('characters', {
                    prefix: 'right-walk.',
                    start: 0,
                    end: 3,
                    zeroPad: 3
                }),
                frameRate: 10,
                repeat: -1
            });
        }

        function createUI(scene) {
            // 标题
            scene.add.text(20, 20, '长安文豪会', {
                font: 'bold 24px STKaiti, KaiTi, Arial',
                fill: '#ffd700',
                stroke: '#000000',
                strokeThickness: 4
            }).setScrollFactor(0).setDepth(100);
            
            scene.add.text(20, 50, '方向键移动', {
                font: '14px STKaiti, KaiTi, Arial',
                fill: '#aaaaaa'
            }).setScrollFactor(0).setDepth(100);
            
            // 底部状态栏
            const bg = scene.add.graphics();
            bg.fillStyle(0x000000, 0.85);
            bg.fillRect(0, 520, 800, 80);
            bg.setScrollFactor(0).setDepth(99);
            
            // 头像
            const libai = scene.add.image(60, 560, 'libai_face');
            libai.setDisplaySize(50, 50);
            libai.setScrollFactor(0).setDepth(100);
            
            const dufu = scene.add.image(220, 560, 'dufu_face');
            dufu.setDisplaySize(50, 50);
            dufu.setScrollFactor(0).setDepth(100);
            
            const sushi = scene.add.image(380, 560, 'sushi_face');
            sushi.setDisplaySize(50, 50);
            sushi.setScrollFactor(0).setDepth(100);
            
            // 名字
            scene.add.text(120, 545, '李白 · 诗仙', {
                font: 'bold 16px STKaiti, KaiTi, Arial',
                fill: '#ffd700'
            }).setScrollFactor(0).setDepth(100);
            
            scene.add.text(280, 545, '杜甫 · 诗圣', {
                font: 'bold 16px STKaiti, KaiTi, Arial',
                fill: '#ffd700'
            }).setScrollFactor(0).setDepth(100);
            
            scene.add.text(440, 545, '苏轼 · 东坡居士', {
                font: 'bold 16px STKaiti, KaiTi, Arial',
                fill: '#ffd700'
            }).setScrollFactor(0).setDepth(100);
            
            scene.add.text(120, 570, '🟢 空闲中', {
                font: '14px STKaiti, KaiTi, Arial',
                fill: '#aaaaaa'
            }).setScrollFactor(0).setDepth(100);
            
            scene.add.text(280, 570, '🟢 空闲中', {
                font: '14px STKaiti, KaiTi, Arial',
                fill: '#aaaaaa'
            }).setScrollFactor(0).setDepth(100);
            
            scene.add.text(440, 570, '🟢 空闲中', {
                font: '14px STKaiti, KaiTi, Arial',
                fill: '#aaaaaa'
            }).setScrollFactor(0).setDepth(100);
            
            // 右侧工具面板
            const panelBg = scene.add.graphics();
            panelBg.fillStyle(0x8B4513, 0.9);
            panelBg.fillRoundedRect(650, 20, 130, 200, 10);
            panelBg.lineStyle(2, 0xDAA520);
            panelBg.strokeRoundedRect(650, 20, 130, 200, 10);
            panelBg.setScrollFactor(0).setDepth(99);
            
            scene.add.text(715, 40, '干预工具', {
                font: 'bold 16px STKaiti, KaiTi, Arial',
                fill: '#ffd700'
            }).setOrigin(0.5).setScrollFactor(0).setDepth(100);
            
            scene.add.text(715, 75, '🍶 送酒', {
                font: '14px STKaiti, KaiTi, Arial',
                fill: '#ffffff'
            }).setOrigin(0.5).setScrollFactor(0).setDepth(100);
            
            scene.add.text(715, 110, '📖 赠书', {
                font: '14px STKaiti, KaiTi, Arial',
                fill: '#ffffff'
            }).setOrigin(0.5).setScrollFactor(0).setDepth(100);
            
            scene.add.text(715, 145, '📜 出题', {
                font: '14px STKaiti, KaiTi, Arial',
                fill: '#ffffff'
            }).setOrigin(0.5).setScrollFactor(0).setDepth(100);
            
            scene.add.text(715, 185, '点数：3', {
                font: 'bold 14px STKaiti, KaiTi, Arial',
                fill: '#ffff00'
            }).setOrigin(0.5).setScrollFactor(0).setDepth(100);
        }

        function update() {
            player.setVelocity(0);
            const speed = 160;
            
            if (cursors.left.isDown) {
                player.setVelocityX(-speed);
                if (player.anims.currentAnim?.key !== 'walk-left') {
                    player.anims.play('walk-left', true);
                }
            } else if (cursors.right.isDown) {
                player.setVelocityX(speed);
                if (player.anims.currentAnim?.key !== 'walk-right') {
                    player.anims.play('walk-right', true);
                }
            }
            
            if (cursors.up.isDown) {
                player.setVelocityY(-speed);
                if (player.anims.currentAnim?.key !== 'walk-up') {
                    player.anims.play('walk-up', true);
                }
            } else if (cursors.down.isDown) {
                player.setVelocityY(speed);
                if (player.anims.currentAnim?.key !== 'walk-down') {
                    player.anims.play('walk-down', true);
                }
            }
            
            if (!cursors.left.isDown && !cursors.right.isDown && !cursors.up.isDown && !cursors.down.isDown) {
                player.anims.stop();
            }
            
            // AI 随机移动
            agents.forEach(agent => {
                if (Phaser.Math.Between(0, 100) < 2) {
                    agent.setVelocityX(Phaser.Math.Between(-50, 50));
                }
                if (Phaser.Math.Between(0, 100) < 2) {
                    agent.setVelocityY(Phaser.Math.Between(-50, 50));
                }
            });
        }
    </script>
</body>
</html>
